<style>
  :root {
    --bg-color: #0d1117;
    --panel-bg: rgba(22, 27, 34, 0.7);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --income: #3fb950;
    --expense: #f85149;
    --input-bg: rgba(13, 17, 23, 0.8);
    --hover-bg: rgba(255, 255, 255, 0.04);
    --sidebar-width: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
  
  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.08), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(63, 185, 80, 0.08), transparent 25%);
  }

  /* LAYOUT SHELL */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--panel-bg);
    border-right: 1px solid var(--glass-border);
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    position: fixed;
    height: 100vh;
    z-index: 100;
  }

  .sidebar-logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .nav-item {
    padding: 0.8rem 1rem;
    border-radius: 8px;
    color: var(--text-muted);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }

  .nav-item:hover {
    background: var(--hover-bg);
    color: #fff;
  }

  .nav-item.active {
    border-left: 3px solid var(--accent);
    border-radius: 4px 8px 8px 4px;
    background: rgba(88, 166, 255, 0.1);
    color: #fff;
  }

  .main-content {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 2.5rem;
    width: calc(100% - var(--sidebar-width));
  }
  
  /* CONTAINERS */
  .container-full {
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
  }
  
  .container-single {
    max-width: 1000px;
    width: 100%;
    margin: 0 auto;
    padding-top: 1.5rem;
  }

  /* UI COMPONENTS */
  .glass-panel {
    background: var(--panel-bg);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1.8rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  h1, h2, h3 { color: #fff; font-weight: 600; }
  .header-title { font-size: 1.4rem; margin-bottom: 1.5rem; text-align: center; }
  .section-title { font-size: 1.2rem; margin-bottom: 1rem; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .summary-card {
    padding: 1.5rem 1.2rem;
    border-radius: 12px;
    background: var(--input-bg);
    border: 1px solid var(--glass-border);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .summary-card:hover { 
    transform: translateY(-4px); 
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .summary-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .summary-val { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .val-income { color: var(--income); }
  .val-expense { color: var(--expense); }

  /* CHART SECTION */
  .chart-container {
    background: var(--panel-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  /* MAIN FORM */
  .form-group { margin-bottom: 1.3rem; }
  label { display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 500; }
  input, select {
    width: 100%;
    padding: 0.8rem 1rem;
    background: var(--input-bg);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2); }
  button {
    width: 100%;
    padding: 0.9rem;
    margin-top: 0.5rem;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #1f6feb, #3b82f6);
    color: #fff;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }

  /* TABLE */
  .table-container { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th, td { padding: 1rem 0.5rem; text-align: left; border-bottom: 1px solid var(--glass-border); }
  th { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--glass-border); }
  tr { transition: background 0.2s; }
  tr:hover { background: var(--hover-bg); }
  .td-date { color: var(--text-muted); font-size: 0.85rem; white-space: nowrap; }
  .td-category { font-weight: 500; }
  .td-notes { color: var(--text-muted); font-size: 0.9rem;}
  .badge { padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-income { background: rgba(63, 185, 80, 0.15); color: var(--income); }
  .badge-expense { background: rgba(248, 81, 73, 0.15); color: var(--expense); }

  /* STATES */
  .empty-state { text-align: center; color: var(--text-muted); padding: 2rem; }
  .error-state { text-align: center; color: #f85149; padding: 2rem; }
  .amount-cell { text-align: right; font-weight: 600; font-size: 1.05rem; }
  .placeholder-panel { text-align: center; padding: 4rem; }
  .placeholder-title { margin-bottom: 1rem; }
  .placeholder-text { color: var(--text-muted); }
  .text-white { color: #fff; }
  .text-orange { color: #ff9800; }
  .max-w-600 { max-width: 600px; margin: 0 auto; }

  /* LOADER & TOAST */
  .loader { display: none; text-align: center; margin-top: 1rem; color: var(--accent); font-size: 0.9rem; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% {opacity: 0.6;} 50% {opacity: 1;} 100% {opacity: 0.6;} }
  
  #toast {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #238636;
    color: white;
    padding: 0.8rem 1.5rem;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    z-index: 1000;
  }
  #toast.show { bottom: 30px; }

  /* ROUTING / TAB PAGES */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { 
    from { opacity: 0; transform: translateY(10px); } 
    to { opacity: 1; transform: translateY(0); } 
  }

  /* RESPONSIVE */
  @media (max-width: 1200px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { 
      position: static; width: 100%; height: auto; 
      border-right: none; border-bottom: 1px solid var(--glass-border); 
      padding: 1rem; flex-direction: row; justify-content: space-between; 
      align-items: center; 
    }
    .sidebar-logo { margin-bottom: 0; }
    .nav-item { padding: 0.5rem; font-size: 0.9rem; }
    .main-content { margin-left: 0; width: 100%; padding: 1rem; }
    .summary-grid { grid-template-columns: 1fr; }
  }
</style>
