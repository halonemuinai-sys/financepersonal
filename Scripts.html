<script>
  // Format mata uang Rupiah
  const formatCurrency = (val) => {
    return new Intl.NumberFormat('id-ID', { 
      style: 'currency', 
      currency: 'IDR', 
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(val);
  };

  let financeChartInstance = null;

  // Visualizing Chart JS
  function renderChart(summary) {
    const ctx = document.getElementById('financeChart');
    if(!ctx) return;

    // Hapus instansi lama agar tidak menumpuk saat refresh
    if(financeChartInstance) {
      financeChartInstance.destroy();
    }

    financeChartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Gaji', 'Tunjangan', 'Potongan Pajak', 'BPJS', 'Pengeluaran Lain'],
        datasets: [{
          data: [
            summary.salary, 
            summary.allowance, 
            summary.tax, 
            summary.bpjs, 
            summary.otherExpense
          ],
          backgroundColor: [
            '#3fb950', // Greenish untuk Gaji
            '#2ea043', // Green Leaf untuk Tunjangan
            '#f85149', // Redish untuk Pajak
            '#da3633', // Dark Red untuk BPJS
            '#ff9800'  // Orange untuk Lainnya
          ],
          borderWidth: 0,
          hoverOffset: 12
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { 
            position: 'right', 
            labels: { color: '#c9d1d9', font: { family: 'Inter', size: 12 } } 
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                let value = context.raw;
                return ' ' + formatCurrency(value);
              }
            }
          }
        },
        cutout: '75%'
      }
    });
  }

  // Dinamis mengatur Dropdown Select Element (Tergantung val Tipe)
  function updateCategoryOptions() {
    const type = document.getElementById('type').value;
    const catSelect = document.getElementById('category');
    catSelect.innerHTML = '';
    
    let options = [];
    if(type === 'Income') {
      options = ['Gaji Pokok', 'Tunjangan', 'Bonus Tambahan', 'Pendapatan Lain'];
    } else {
      options = ['Potongan Pajak', 'Potongan BPJS', 'Deduction/Asuransi Lain', 'Belanja/Lifestyle', 'Tagihan', 'Pengeluaran Lain'];
    }
    
    options.forEach(opt => {
      let el = document.createElement('option');
      el.value = opt;
      el.innerText = opt;
      catSelect.appendChild(el);
    });
  }

  // Navigasi SPA (Single Page Application) antar page sidebar
  function switchPage(pageId, element) {
    document.querySelectorAll('.page').forEach(page => {
      page.classList.remove('active');
    });
    document.querySelectorAll('.nav-item').forEach(nav => {
      nav.classList.remove('active');
    });
    
    document.getElementById('page-' + pageId).classList.add('active');
    element.classList.add('active');
  }

  // Memuat Data Dashboard 
  function loadData() {
    if(typeof google === 'undefined' || typeof google.script === 'undefined') {
      document.getElementById('txTable').innerHTML = '<tr><td colspan="4" class="empty-state">(Local Environment - Apps Script Not Detected)</td></tr>';
      
      // Simulasi Dummy di Local Environment
      setTimeout(() => {
        document.getElementById('val-balance').innerText = "Rp 15.000.000";
        document.getElementById('val-income').innerText = "Rp 21.000.000";
        document.getElementById('val-deductions').innerText = "Rp 2.000.000";
        document.getElementById('val-other-expense').innerText = "Rp 4.000.000";
        renderChart({ salary: 18000000, allowance: 3000000, tax: 1500000, bpjs: 500000, otherExpense: 4000000 });
      }, 500);

      return; 
    }
    
    google.script.run.withSuccessHandler(function(response) {
      if(response.success) {
        
        // Mempebaru KPI Cards
        document.getElementById('val-balance').innerText = formatCurrency(response.summary.balance);
        document.getElementById('val-income').innerText = formatCurrency(response.summary.income);
        // Gabungan deduction
        document.getElementById('val-deductions').innerText = formatCurrency(response.summary.tax + response.summary.bpjs);
        document.getElementById('val-other-expense').innerText = formatCurrency(response.summary.otherExpense);
        
        // Memperbarui Grafik
        renderChart(response.summary);
        
        let html = '';
        if(response.transactions.length === 0) {
          html = '<tr><td colspan="4" class="empty-state">Belum ada riwayat transaksi.</td></tr>';
        } else {
          response.transactions.forEach(tx => {
            const isIncome = tx.type === 'Income';
            const badgeClass = isIncome ? 'badge-income' : 'badge-expense';
            const amountColor = isIncome ? 'color: var(--income);' : 'color: var(--expense);';
            const sign = isIncome ? '+' : '-';
            
            const notesHTML = tx.notes ? `<div class="td-notes">${tx.notes}</div>` : '';
            
            html += `<tr>
              <td class="td-date">${tx.date}</td>
              <td><span class="badge ${badgeClass}">${tx.type}</span></td>
              <td>
                <div class="td-category">${tx.category}</div>
                ${notesHTML}
              </td>
              <td class="amount-cell" style="${amountColor}">
                ${sign} ${formatCurrency(Math.abs(tx.amount))}
              </td>
            </tr>`;
          });
        }
        document.getElementById('txTable').innerHTML = html;
      } else {
        document.getElementById('txTable').innerHTML = `<tr><td colspan="4" class="error-state">Gagal memuat data: ${response.message}</td></tr>`;
      }
    }).withFailureHandler(function(err){
        document.getElementById('txTable').innerHTML = `<tr><td colspan="4" class="error-state">Error Server: ${err.message}</td></tr>`;
    }).getDashboardData();
  }

  // Submit form penambahan transaksi
  function submitForm(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    
    btn.style.display = 'none';
    loader.style.display = 'block';

    const data = {
      type: document.getElementById('type').value,
      amount: document.getElementById('amount').value,
      category: document.getElementById('category').value,
      notes: document.getElementById('notes').value
    };

    if(typeof google === 'undefined' || typeof google.script === 'undefined') {
      setTimeout(() => resetForm(btn, loader), 1000);
      return;
    }

    google.script.run.withSuccessHandler(function(res) {
      resetForm(btn, loader);
      if(res.success) {
        showToast('Data berhasil ditambahkan!');
        document.getElementById('txForm').reset();
        updateCategoryOptions(); // Kembalikan default select
        loadData(); // Memuat ulang list tanpa refresh halaman
      } else {
        showToast('Gagal: ' + res.message, true);
      }
    }).withFailureHandler(function(err){
      resetForm(btn, loader);
      showToast('Error Server: ' + err.message, true);
    }).addTransaction(data);
  }

  function resetForm(btn, loader) {
    btn.style.display = 'block';
    loader.style.display = 'none';
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.background = isError ? '#f85149' : '#238636';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Panggil loadData dan persiapkan opsi pertama kali halaman dibuka
  window.onload = () => {
    updateCategoryOptions();
    loadData();
  };
</script>
