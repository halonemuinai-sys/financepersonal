<script>
  // Format mata uang Rupiah
  const formatCurrency = (val) => {
    return new Intl.NumberFormat('id-ID', { 
      style: 'currency', 
      currency: 'IDR', 
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(val);
  };

  // Navigasi SPA (Single Page Application) antar page sidebar
  function switchPage(pageId, element) {
    // Sembunyikan semua konten halaman
    document.querySelectorAll('.page').forEach(page => {
      page.classList.remove('active');
    });
    // Hilangkan status aktif pada menu sidebar
    document.querySelectorAll('.nav-item').forEach(nav => {
      nav.classList.remove('active');
    });
    
    // Tampilkan yang dipilih
    document.getElementById('page-' + pageId).classList.add('active');
    element.classList.add('active');
  }

  // Memuat Data Dashboard 
  function loadData() {
    if(typeof google === 'undefined' || typeof google.script === 'undefined') {
      document.getElementById('txTable').innerHTML = '<tr><td colspan="4" class="empty-state">(Local Environment - Apps Script Not Detected)</td></tr>';
      return; 
    }
    
    google.script.run.withSuccessHandler(function(response) {
      if(response.success) {
        document.getElementById('val-balance').innerText = formatCurrency(response.summary.balance);
        document.getElementById('val-income').innerText = formatCurrency(response.summary.income);
        document.getElementById('val-expense').innerText = formatCurrency(response.summary.expense);
        
        let html = '';
        if(response.transactions.length === 0) {
          html = '<tr><td colspan="4" class="empty-state">Belum ada riwayat transaksi.</td></tr>';
        } else {
          response.transactions.forEach(tx => {
            const isIncome = tx.type === 'Income';
            const badgeClass = isIncome ? 'badge-income' : 'badge-expense';
            const amountColor = isIncome ? 'color: var(--income);' : 'color: var(--expense);';
            const sign = isIncome ? '+' : '-';
            
            const notesHTML = tx.notes ? `<div class="td-notes">${tx.notes}</div>` : '';
            
            html += `<tr>
              <td class="td-date">${tx.date}</td>
              <td><span class="badge ${badgeClass}">${tx.type}</span></td>
              <td>
                <div class="td-category">${tx.category}</div>
                ${notesHTML}
              </td>
              <td class="amount-cell" style="${amountColor}">
                ${sign} ${formatCurrency(Math.abs(tx.amount))}
              </td>
            </tr>`;
          });
        }
        document.getElementById('txTable').innerHTML = html;
      } else {
        document.getElementById('txTable').innerHTML = `<tr><td colspan="4" class="error-state">Gagal memuat data: ${response.message}</td></tr>`;
      }
    }).withFailureHandler(function(err){
        document.getElementById('txTable').innerHTML = `<tr><td colspan="4" class="error-state">Error Server: ${err.message}</td></tr>`;
    }).getDashboardData();
  }

  // Submit form penambahan transaksi
  function submitForm(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    
    btn.style.display = 'none';
    loader.style.display = 'block';

    const data = {
      type: document.getElementById('type').value,
      amount: document.getElementById('amount').value,
      category: document.getElementById('category').value,
      notes: document.getElementById('notes').value
    };

    if(typeof google === 'undefined' || typeof google.script === 'undefined') {
      setTimeout(() => resetForm(btn, loader), 1000);
      return;
    }

    google.script.run.withSuccessHandler(function(res) {
      resetForm(btn, loader);
      if(res.success) {
        showToast('Data berhasil ditambahkan!');
        document.getElementById('txForm').reset();
        loadData(); // Memuat ulang list tanpa refresh halaman
      } else {
        showToast('Gagal: ' + res.message, true);
      }
    }).withFailureHandler(function(err){
      resetForm(btn, loader);
      showToast('Error Server: ' + err.message, true);
    }).addTransaction(data);
  }

  function resetForm(btn, loader) {
    btn.style.display = 'block';
    loader.style.display = 'none';
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.background = isError ? '#f85149' : '#238636';
    toast.classList.add('show');
    
    // Auto hilangkan setelah 3 detik
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Panggil loadData pertama kali halaman dibuka
  window.onload = loadData;
</script>
