<div class="container-full">
  <!-- KPI CARDS -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-title text-white">Net Balance</div>
      <div class="summary-val" id="val-balance">Rp 0</div>
    </div>
    <div class="summary-card">
      <div class="summary-title">Gross Income</div>
      <div class="summary-val val-income" id="val-income">Rp 0</div>
    </div>
    <div class="summary-card">
      <div class="summary-title">Pajak & BPJS</div>
      <div class="summary-val val-expense" id="val-deductions">Rp 0</div>
    </div>
    <div class="summary-card">
      <div class="summary-title">Lainnya</div>
      <div class="summary-val text-orange" id="val-other-expense">Rp 0</div>
    </div>
  </div>

  <!-- CHARTS AREA -->
  <div class="chart-container">
    <canvas id="financeChart" aria-label="Finance Analytics Chart"></canvas>
  </div>

  <!-- MAIN DASHBOARD CONTENT (RECENT TX) -->
  <div class="glass-panel">
    <h3 class="section-title">Riwayat Terakhir</h3>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Waktu</th>
            <th>Status</th>
            <th>Kategori & Keterangan</th>
            <th class="th-amount">Nominal</th>
          </tr>
        </thead>
        <tbody id="txTable">
          <tr><td colspan="4" class="empty-state">Menghubungkan ke Google Sheets...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
